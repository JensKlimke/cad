name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref so we don't waste runner minutes on
# abandoned commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.3'
  # Force `ci: true` branches in tools that respect it (Turbo, Playwright,
  # Stryker, etc.) so output stays non-interactive.
  CI: 'true'

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

  lint:
    name: Lint + format
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:code
      - run: pnpm lint:handbook
      - run: pnpm format:check

  i18n-check:
    name: i18n catalog gate
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fails the build if any source file calls `t('key')` / `<Trans>`
      # for a translation key that is not in the `en` catalog.
      # Introduced by Slice 0b; the gate scales to every future slice
      # via `packages/i18n/locales/<lang>/<ns>.json`.
      - run: pnpm i18n:check

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit + integration
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Publish unit + integration test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          check_name: Unit + integration tests
          report_paths: |
            packages/*/reports/junit.xml
            apps/*/reports/junit.xml
          require_tests: true
          detailed_summary: true
      - name: Report coverage on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: packages/kernel
          json-summary-path: packages/kernel/coverage/coverage-summary.json
          json-final-path: packages/kernel/coverage/coverage-final.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            packages/*/coverage
            apps/*/coverage
            tests/*/coverage
          retention-days: 7
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-unit
          path: |
            packages/*/reports/junit.xml
            apps/*/reports/junit.xml
          retention-days: 7
          if-no-files-found: ignore

  test-api:
    name: API e2e (Fastify + Supertest)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:api
      - name: Publish API e2e test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          check_name: API e2e tests
          report_paths: tests/api/reports/junit.xml
          require_tests: true
          detailed_summary: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-api
          path: tests/api/reports/junit.xml
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            packages/*/dist
            apps/*/dist
          retention-days: 7
          if-no-files-found: ignore

  test-e2e:
    name: UI e2e (Playwright)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter @cad/tests-e2e exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm --filter @cad/tests-e2e exec playwright install-deps chromium
          else
            pnpm --filter @cad/tests-e2e exec playwright install --with-deps chromium
          fi
      - name: Build web app (preview target)
        run: pnpm turbo run build --filter=@cad/web
      - name: Run golden journey
        run: pnpm test:e2e
      - name: Publish UI e2e test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          check_name: UI e2e tests
          report_paths: tests/e2e/reports/junit.xml
          require_tests: true
          detailed_summary: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-e2e
          path: tests/e2e/reports/junit.xml
          retention-days: 7
          if-no-files-found: ignore
