version: 2

updates:
  # pnpm workspace — Dependabot follows `pnpm-workspace.yaml` automatically
  # when the ecosystem is "npm" and the directory is the repo root.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    groups:
      # Batch minor + patch bumps into one PR per ecosystem to keep review
      # overhead manageable. Majors stay separate so they get individual
      # attention + their own CI run.
      minor-and-patch:
        update-types:
          - minor
          - patch
      eslint-ecosystem:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'eslint-plugin-*'
          - 'eslint-config-*'
          - 'typescript-eslint'
      react-ecosystem:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      vitest-ecosystem:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@vitejs/*'
          - 'vite'
      playwright-ecosystem:
        patterns:
          - '@playwright/*'

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
      - automated
